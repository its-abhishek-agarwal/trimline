name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Download FFmpeg binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPath = "$env:RUNNER_TEMP\\ffmpeg.zip"
          $extractPath = "$env:RUNNER_TEMP\\ffmpeg"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $ffmpeg = Get-ChildItem -Path $extractPath -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path $extractPath -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "Could not find ffmpeg.exe/ffprobe.exe in downloaded archive." }
          New-Item -ItemType Directory -Path "src-tauri/resources/bin" -Force | Out-Null
          Copy-Item -Path $ffmpeg.FullName -Destination "src-tauri/resources/bin/ffmpeg.exe" -Force
          Copy-Item -Path $ffprobe.FullName -Destination "src-tauri/resources/bin/ffprobe.exe" -Force

      - name: Build installers
        run: npx tauri build --bundles nsis,msi

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $exe) { throw "NSIS installer not found." }
          if (-not $msi) { throw "MSI installer not found." }

          Copy-Item $exe.FullName "release-assets/Trimline-Windows-Setup.exe" -Force
          Copy-Item $msi.FullName "release-assets/Trimline-Windows-Installer.msi" -Force

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-assets/Trimline-Windows-Setup.exe
            release-assets/Trimline-Windows-Installer.msi
