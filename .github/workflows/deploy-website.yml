name: Deploy Website

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve website env
        shell: bash
        run: |
          if [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            echo "VITE_BASE_PATH=${{ vars.VITE_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi
          echo "VITE_GITHUB_REPO=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "VITE_KOFI_URL=${{ vars.VITE_KOFI_URL }}" >> "$GITHUB_ENV"
          echo "VITE_RAZORPAY_URL=${{ vars.VITE_RAZORPAY_URL }}" >> "$GITHUB_ENV"

      - name: Build website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
